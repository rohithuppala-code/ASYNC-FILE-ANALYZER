# Docker Compose configuration for Async File Analyzer
# This file defines the Redis and RabbitMQ services needed for the application

version: '3.8'

services:
  # Redis: In-memory data store used as Celery result backend
  # Stores task status and results
  redis:
    image: redis:7-alpine
    container_name: async_file_analyzer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Redis config for persistence
    command: redis-server --appendonly yes
    networks:
      - async_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # RabbitMQ: Message broker for task queue
  # FastAPI sends tasks here, Celery workers consume from here
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: async_file_analyzer_rabbitmq
    ports:
      # Standard AMQP protocol port
      - "5672:5672"
      # Management UI
      - "15672:15672"
    environment:
      # Default credentials for RabbitMQ
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - async_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  async_network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
